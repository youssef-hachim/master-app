<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study in Italy – Master's Planner</title>
    <meta name="description" content="All-in-one smart platform for international students planning a Master's degree in Italy. Track applications, documents, scholarships, visa, analytics, and more.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="app-container">

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="graduation-cap" class="logo-icon"></i>
                <h2>Study in Italy</h2>
            </div>

            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i><span>Dashboard</span>
                </a>
                <a href="#analytics" class="nav-item" data-view="analytics">
                    <i data-lucide="bar-chart-3"></i><span>Analytics</span>
                </a>

                <div class="nav-divider"></div>

                <a href="#masters" class="nav-item" data-view="masters">
                    <i data-lucide="book-open"></i><span>Master's Programs</span>
                </a>
                <a href="#erasmus" class="nav-item" data-view="erasmus">
                    <i data-lucide="globe"></i><span>Erasmus Mundus</span>
                </a>
                <a href="#scholarships" class="nav-item" data-view="scholarships">
                    <i data-lucide="award"></i><span>Scholarships</span>
                </a>
                <a href="#applications" class="nav-item" data-view="applications">
                    <i data-lucide="briefcase"></i><span>Applications</span>
                </a>
                <a href="#documents" class="nav-item" data-view="documents">
                    <i data-lucide="file-check"></i><span>Documents</span>
                </a>

                <div class="nav-divider"></div>

                <a href="#visa" class="nav-item" data-view="visa">
                    <i data-lucide="shield"></i><span>Visa Checklist</span>
                </a>
                <a href="#calendar" class="nav-item" data-view="calendar">
                    <i data-lucide="calendar"></i><span>Deadlines</span>
                </a>
                <a href="#portals" class="nav-item" data-view="portals">
                    <i data-lucide="key"></i><span>My Portals</span>
                </a>

                <div class="nav-divider"></div>

                <a href="#accommodation" class="nav-item" data-view="accommodation">
                    <i data-lucide="home"></i><span>Accommodation</span>
                </a>
                <a href="#internships" class="nav-item" data-view="internships">
                    <i data-lucide="building"></i><span>Internships</span>
                </a>
                <a href="#cities" class="nav-item" data-view="cities">
                    <i data-lucide="map-pin"></i><span>City Comparison</span>
                </a>
                <a href="#budget" class="nav-item" data-view="budget">
                    <i data-lucide="pie-chart"></i><span>Budget Planner</span>
                </a>
                <a href="#notes" class="nav-item" data-view="notes">
                    <i data-lucide="notebook"></i><span>Notes</span>
                </a>

                <div class="nav-divider"></div>

                <a href="#afterarrival" class="nav-item" data-view="afterarrival">
                    <i data-lucide="plane"></i><span>After Arrival</span>
                </a>
                <a href="#resources" class="nav-item" data-view="resources">
                    <i data-lucide="link"></i><span>Resources</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#profile" class="nav-item" data-view="profile">
                    <i data-lucide="user"></i><span>My Profile</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="mobile-menu-toggle" class="icon-btn">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search programs, cities...">
                    </div>
                    <button class="icon-btn position-relative" id="alerts-btn" title="Alerts">
                        <i data-lucide="bell"></i>
                        <span class="notification-badge" id="notif-badge" style="display:none">0</span>
                    </button>
                    <div class="user-avatar cursor-pointer" onclick="location.hash='#profile'">
                        <img src="https://ui-avatars.com/api/?name=S&background=1e40af&color=fff" alt="Profile">
                    </div>
                </div>
            </header>

            <main id="main-content" class="content-area"></main>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/masters.js"></script>
    <script src="js/views/erasmus.js"></script>
    <script src="js/views/applications.js"></script>
    <script src="js/views/documents.js"></script>
    <script src="js/views/visa.js"></script>
    <script src="js/views/secondary.js"></script>
    <script src="js/views/tools.js"></script>
    <script src="js/views/advanced.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
